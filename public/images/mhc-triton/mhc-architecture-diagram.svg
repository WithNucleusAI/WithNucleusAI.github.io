<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" width="800" height="950">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="950" fill="#F9FAFB"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1F2937">Architecture Diagram</text>
  
  <!-- Legend -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="32" y="17" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Kernel</text>
    
    <rect x="0" y="40" width="24" height="24" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="32" y="57" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Tensor</text>
    
    <rect x="0" y="80" width="24" height="24" rx="4" fill="#CCFBF1" stroke="#14B8A6" stroke-width="2"/>
    <text x="32" y="97" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Layer</text>
  </g>
  
  <!-- H (input tensor) -->
  <rect x="300" y="70" width="180" height="70" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="390" y="100" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#1E40AF">H</text>
  <text x="390" y="122" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#3B82F6">[batch, seq, 4, dim]</text>
  
  <!-- Connection from H down to split point -->
  <line x1="390" y1="140" x2="390" y2="170" stroke="#6B7280" stroke-width="2"/>
  
  <!-- Horizontal line splitting to Fused Kernel and down to Stream Mix -->
  <line x1="390" y1="170" x2="200" y2="170" stroke="#6B7280" stroke-width="2"/>
  <line x1="200" y1="170" x2="200" y2="180" stroke="#6B7280" stroke-width="2"/>
  
  <!-- Arrow from H straight down to Stream Mix Kernel -->
  <line x1="390" y1="170" x2="390" y2="400" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Fused Dynamic Weights Kernel -->
  <rect x="100" y="180" width="200" height="80" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="200" y="212" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Fused Dynamic</text>
  <text x="200" y="232" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Weights Kernel</text>
  
  <!-- Connection from Fused to H_pre, H_res, H_post -->
  <line x1="200" y1="260" x2="200" y2="285" stroke="#6B7280" stroke-width="2"/>
  <line x1="110" y1="285" x2="290" y2="285" stroke="#6B7280" stroke-width="2"/>
  <line x1="110" y1="285" x2="110" y2="300" stroke="#6B7280" stroke-width="2"/>
  <line x1="200" y1="285" x2="200" y2="300" stroke="#6B7280" stroke-width="2"/>
  <line x1="290" y1="285" x2="290" y2="300" stroke="#6B7280" stroke-width="2"/>
  
  <!-- H_pre -->
  <rect x="70" y="300" width="80" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="325" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">H_pre</text>
  <text x="110" y="343" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#3B82F6">[B,4]</text>
  
  <!-- H_res -->
  <rect x="160" y="300" width="80" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="325" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">H_res</text>
  <text x="200" y="343" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#3B82F6">[B,4,4]</text>
  
  <!-- H_post -->
  <rect x="250" y="300" width="80" height="60" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="290" y="325" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">H_post</text>
  <text x="290" y="343" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#3B82F6">[B,4]</text>
  
  <!-- Arrow from H_pre to Stream Mix Kernel (clean horizontal then vertical) -->
  <path d="M 110 360 L 110 435 L 300 435" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from H_res to Stream Mix Kernel (clean horizontal then vertical) -->
  <path d="M 200 360 L 200 455 L 300 455" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from H_post down and around to Add Residual Kernel -->
  <path d="M 290 360 L 290 385 L 50 385 L 50 785 L 260 785" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stream Mix Kernel -->
  <rect x="300" y="410" width="180" height="70" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="390" y="440" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Stream Mix</text>
  <text x="390" y="460" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Kernel</text>
  
  <!-- Connections from Stream Mix - split to branch_input and H_residual -->
  <line x1="390" y1="480" x2="390" y2="510" stroke="#6B7280" stroke-width="2"/>
  <line x1="340" y1="510" x2="550" y2="510" stroke="#6B7280" stroke-width="2"/>
  
  <!-- Arrow down to branch_input -->
  <line x1="340" y1="510" x2="340" y2="540" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to H_residual -->
  <line x1="550" y1="510" x2="550" y2="540" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- branch_input -->
  <rect x="260" y="550" width="160" height="60" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">branch_input</text>
  <text x="340" y="595" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3B82F6">[B, S, dim]</text>
  
  <!-- H_residual -->
  <rect x="480" y="550" width="140" height="60" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">H_residual</text>
  <text x="550" y="595" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3B82F6">[B,S,4,dim]</text>
  
  <!-- Arrow from branch_input to Your Layer -->
  <line x1="340" y1="610" x2="340" y2="640" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Your Layer (THE STAR - Teal) -->
  <rect x="260" y="650" width="160" height="70" rx="14" fill="#CCFBF1" stroke="#14B8A6" stroke-width="3" filter="url(#shadow)"/>
  <text x="340" y="680" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#0F766E">Your Layer</text>
  <text x="340" y="700" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#14B8A6">Attention / MLP</text>
  
  <!-- Arrow from Your Layer to Add Residual -->
  <line x1="340" y1="720" x2="340" y2="755" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from H_residual to Add Residual Kernel -->
  <path d="M 550 610 L 550 805 L 420 805" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Add Residual Kernel -->
  <rect x="260" y="765" width="160" height="70" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="340" y="795" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Add Residual</text>
  <text x="340" y="815" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#92400E">Kernel</text>
  
  <!-- Arrow to H_new -->
  <line x1="340" y1="835" x2="340" y2="865" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- H_new (output tensor) -->
  <rect x="260" y="875" width="160" height="60" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="340" y="900" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#1E40AF">H_new</text>
  <text x="340" y="918" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3B82F6">[batch, seq, 4, dim]</text>
</svg>
